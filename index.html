<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오현중학교 시간표</title>
  <style>
    :root {
      --page-pad: clamp(10px, 1.4vh, 20px);
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --changed: #eff6ff;
      --changed-line: #38bdf8;
      --green-soft: #ecfdf5;
      --green-ink: #047857;
      --amber-soft: #fffbeb;
      --amber-ink: #92400e;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }

    body {
      padding: var(--page-pad);
      height: 100dvh;
      overflow: hidden;
    }

    .app {
      width: min(100%, 1540px);
      height: calc(100dvh - (var(--page-pad) * 2));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 620px;
      align-items: center;
      gap: 16px;
      margin-bottom: clamp(8px, 1.2vh, 16px);
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.5vw, 2.25rem);
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    .header-clock {
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 2px;
      font-size: clamp(1.7rem, 2.05vw, 2.18rem);
      font-weight: 850;
      letter-spacing: -0.055em;
      line-height: 1;
      font-family: "Pretendard", "Inter", "Segoe UI", system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "ss01" 1;
      color: var(--ink);
      white-space: nowrap;
      min-width: 160px;
      text-align: left;
    }

    .date-clock-group {
      display: contents;
    }

    .controls {
      justify-self: stretch;
      width: 100%;
      display: grid;
      grid-template-columns: 160px 146px minmax(190px, 1fr) 92px;
      align-items: center;
      justify-content: stretch;
      gap: 6px;
      min-width: 0;
    }

    select, button, input[type="date"], textarea {
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      font: inherit;
      color: var(--ink);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    select, button, input[type="date"] {
      height: 40px;
      padding: 0 12px;
      font-weight: 800;
    }

    input[type="date"] {
      width: 100%;
      min-width: 0;
      padding-left: 12px;
      padding-right: 8px;
    }

    #reloadBtn {
      width: 100%;
      min-width: 0;
      white-space: nowrap;
      padding-left: 10px;
      padding-right: 10px;
    }

    button {
      cursor: pointer;
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    button.secondary {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    .grade-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      width: 100%;
      min-width: 0;
      white-space: nowrap;
    }

    .grade-btn {
      height: 32px;
      padding: 0 8px;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      border: 0;
      box-shadow: none;
      font-size: 0.88rem;
    }

    .grade-btn.active {
      background: var(--blue);
      color: white;
    }

    button.ghost {
      background: #f8fafc;
      color: var(--muted);
      border-color: var(--line);
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .status-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 13px 15px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .date-line {
      display: flex;
      align-items: baseline;
      gap: 18px;
      flex-wrap: wrap;
    }

    .date-main {
      font-size: 1.04rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .clock-main {
      font-size: clamp(1.55rem, 2.5vw, 2.25rem);
      font-weight: 950;
      letter-spacing: -0.04em;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .date-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .badge {
      white-space: nowrap;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #1d4ed8;
      padding: 8px 11px;
      font-weight: 900;
      font-size: 0.84rem;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 620px;
      gap: 16px;
      align-items: stretch;
      flex: 1 1 auto;
      min-height: 0;
    }

    .left-panel, .side-panel {
      min-width: 0;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .table-wrap, .side-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: clamp(8px, 1.1vh, 14px) 16px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .table-head h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: -0.04em;
    }

    #refreshInfo {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }

    table {
      width: 100%;
      min-width: 650px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      height: 100%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      height: clamp(38px, 5.4vh, 50px);
      font-size: clamp(1rem, 1.85vh, 1.18rem);
      font-weight: 900;
    }

    tbody th {
      width: 82px;
      background: #f9fafb;
      color: #374151;
      font-weight: 900;
      border-right: 1px solid var(--line);
    }

    th, td {
      text-align: center;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 0;
    }

    th:last-child, td:last-child { border-right: 0; }
    tr:last-child th, tr:last-child td { border-bottom: 0; }

    td {
      height: auto;
      background: white;
    }

    td.changed {
      background: var(--changed);
      box-shadow: inset 0 0 0 2px var(--changed-line);
    }

    .cell {
      min-height: 0;
      height: 100%;
      padding: clamp(3px, 0.7vh, 8px) 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.08rem, min(1.9vw, 2.65vh), 1.78rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      word-break: keep-all;
      line-height: 1.12;
    }

    .class-head { background: #f8fafc; }
    .period { font-size: clamp(1rem, 1.85vh, 1.16rem); }

    .empty {
      color: #d1d5db;
      font-weight: 700;
    }

    .side-panel {
      display: grid;
      grid-template-rows: minmax(0, 0.8fr) minmax(0, 1.2fr);
      gap: clamp(8px, 1.3vh, 14px);
      height: 100%;
      min-height: 0;
    }

    .side-card {
      padding: clamp(10px, 1.4vh, 16px);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .side-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .side-title h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: -0.04em;
    }

    .mini-badge {
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-ink);
      padding: 5px 9px;
      font-size: 0.76rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .notice-view {
      flex: 1;
      min-height: 0;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 16px;
      font-size: clamp(1rem, 1.18vw, 1.22rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow: auto;
    }

    .notice-placeholder {
      color: #9ca3af;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 0;
      padding: 14px;
      resize: vertical;
      line-height: 1.5;
      font-weight: 700;
      display: none;
    }

    .notice-actions {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 6px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .notice-actions button {
      height: 32px;
      min-width: 54px;
      padding: 0 10px;
      font-size: 0.78rem;
      border-radius: 999px;
      box-shadow: none;
    }

    .local-note {
      margin-top: 9px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .meal-menu-card {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 14px 16px;
      font-size: var(--meal-font-size, clamp(1.18rem, 1.36vw, 1.42rem));
      font-weight: 850;
      letter-spacing: -0.03em;
      line-height: 1.5;
      word-break: keep-all;
    }

    .meal-line {
      padding: clamp(2px, 0.55vh, 4px) 0 clamp(3px, 0.65vh, 6px);
      border-bottom: 1px dashed rgba(209, 213, 219, 0.8);
    }

    .meal-line:last-child {
      border-bottom: 0;
    }

    .meal-name {
      display: inline;
    }

    .allergen-names {
      display: inline;
      margin-left: 8px;
      color: var(--muted);
      font-size: calc(var(--meal-font-size, 1.25rem) * 0.68);
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.02em;
      white-space: normal;
    }

    .allergen-legend {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #d1d5db;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.45;
      font-weight: 700;
    }

    .meal-empty, .loading {
      flex: 1;
      padding: 30px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.55;
    }

    .meal-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(0.68rem, 1.2vh, 0.82rem);
      line-height: 1.45;
    }

    .error {
      margin-top: 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      display: none;
      white-space: pre-wrap;
    }

    .notice {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.55;
    }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: clamp(6px, 1vh, 12px);
      font-size: clamp(0.68rem, 1.2vh, 0.82rem);
    }

    footer a {
      color: inherit;
      text-decoration: none;
      font-weight: 800;
    }

    @media (max-width: 1280px) {
      .top, .main-grid { grid-template-columns: 1fr; }
      .controls {
        justify-self: stretch;
        grid-template-columns: 160px 146px minmax(190px, 1fr) 92px;
      }
      .side-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: auto;
      }
    }

    @media (max-width: 760px) {
      body { padding: var(--page-pad); overflow: auto; height: auto; }
      .app { height: auto; min-height: calc(100dvh - (var(--page-pad) * 2)); }
      .top {
        align-items: stretch;
      }
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .date-clock-group { display: contents; }
      select, button, input[type="date"] { min-width: 0; }
      .header-clock { min-width: 0; }
      .grade-tabs { width: 100%; }
      #reloadBtn { width: 100%; }
      #refreshInfo { white-space: normal; text-align: right; }
      .status-card {
        align-items: flex-start;
        flex-direction: column;
      }
      .badge { white-space: normal; }
      .side-panel { grid-template-columns: 1fr; }
      .notice-actions { grid-template-columns: repeat(3, auto); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title-block">
        <h1>오현중학교 시간표</h1>
      </div>

      <div class="controls">
        <div class="date-clock-group">
          <div id="clockText" class="header-clock">--:--:--</div>
          <input id="dateInput" type="date" aria-label="날짜 선택" />
        </div>
        <div class="grade-tabs" role="group" aria-label="학년 선택">
          <button class="grade-btn" type="button" data-grade="1">1학년</button>
          <button class="grade-btn" type="button" data-grade="2">2학년</button>
          <button class="grade-btn" type="button" data-grade="3">3학년</button>
        </div>
        <button id="reloadBtn" type="button">새로고침</button>
      </div>
    </header>


    <section class="main-grid">
      <div class="left-panel">
        <section class="table-wrap">
          <div class="table-head">
            <h2 id="tableTitle">1학년 시간표</h2>
            <span id="refreshInfo">마지막 새로고침: -</span>
          </div>
          <div class="table-scroll">
            <table id="timetable" aria-label="시간표">
              <tbody>
                <tr>
                  <td class="loading">컴시간알리미 서버에서 시간표를 불러오고 있습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
        <div id="errorBox" class="error"></div>
      </div>

      <aside class="side-panel" aria-label="오른쪽 정보 영역">
        <section class="side-card">
          <div class="side-title">
            <h2>공지사항</h2>
            <div class="notice-actions">
              <button id="noticeEditBtn" class="secondary" type="button">수정</button>
              <button id="noticeSaveBtn" type="button">저장</button>
              <button id="noticeClearBtn" class="ghost" type="button">비우기</button>
            </div>
          </div>
          <div id="noticeView" class="notice-view notice-placeholder">공지사항을 입력하세요.</div>
          <textarea id="noticeInput" aria-label="공지사항 입력" placeholder="예: 오늘 6교시 후 학년 협의회가 있습니다."></textarea>
        </section>

        <section class="side-card">
          <div class="side-title">
            <h2>오늘의 급식</h2>
            <span id="mealBadge" class="mini-badge">불러오는 중</span>
          </div>
          <div id="mealBox" class="meal-empty">급식 정보를 불러오는 중입니다.</div>
          <div id="mealMeta" class="meal-meta"></div>
        </section>
      </aside>
    </section>


    <footer>© 2026 BirdieAlgorithm · <a href="http://tt.djcom.kr" target="_blank" rel="noopener">http://tt.djcom.kr</a></footer>
  </main>

<script>
const CLASSES_PER_GRADE = 7;
const PERIODS = 7;
const WEEKDAY_KO = ["일", "월", "화", "수", "목", "금", "토"];
const LOCAL_NOTICE_KEY = "ohyun-timetable-local-notice-v1";
const ALLERGEN_MAP = {
  "1": "난류",
  "2": "우유",
  "3": "메밀",
  "4": "땅콩",
  "5": "대두",
  "6": "밀",
  "7": "고등어",
  "8": "게",
  "9": "새우",
  "10": "돼지고기",
  "11": "복숭아",
  "12": "토마토",
  "13": "아황산류",
  "14": "호두",
  "15": "닭고기",
  "16": "쇠고기",
  "17": "오징어",
  "18": "조개류",
  "19": "잣"
};

const state = {
  grade: 1,
  date: "",
  data: null,
  updatedAt: null,
  noticeEditing: false
};

const $ = (id) => document.getElementById(id);

function getKstDate() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 9 * 60 * 60 * 1000);
}

function toDateInputValue(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function dateFromInput(value) {
  return new Date(`${value}T00:00:00+09:00`);
}

function formatDateKST(value) {
  const date = typeof value === "string" ? dateFromInput(value) : value;
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const w = WEEKDAY_KO[date.getDay()];
  return `${y}년 ${m}월 ${d}일 (${w})`;
}

function addDays(date, days) {
  const copy = new Date(date);
  copy.setDate(copy.getDate() + days);
  return copy;
}

function setStatus(main, sub, badge) {
  // 상단 상태 카드는 제거했습니다. 로딩/오류 상태는 표와 오류 박스에서만 표시합니다.
}

function updateClock() {
  const now = getKstDate();
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  const ss = String(now.getSeconds()).padStart(2, "0");
  $("clockText").textContent = `${hh}:${mm}:${ss}`;
}

function showError(message) {
  const box = $("errorBox");
  box.style.display = "block";
  box.textContent = message;
}

function clearError() {
  const box = $("errorBox");
  box.style.display = "none";
  box.textContent = "";
}

function setLoading(message = "컴시간알리미 서버에서 시간표를 불러오고 있습니다.") {
  $("timetable").innerHTML = `<tbody><tr><td class="loading">${escapeHtml(message)}</td></tr></tbody>`;
}

async function fetchTimetable(dateValue) {
  const res = await fetch(`/api/timetable?date=${encodeURIComponent(dateValue)}`, { cache: "no-store" });
  const text = await res.text();

  if (!res.ok) throw new Error(`API 오류 ${res.status}\n${text.slice(0, 600)}`);

  try {
    return JSON.parse(text);
  } catch (err) {
    throw new Error("API 응답을 JSON으로 해석하지 못했습니다.\n" + text.slice(0, 600));
  }
}

async function fetchMeal(dateValue) {
  const res = await fetch(`/api/meal?date=${encodeURIComponent(dateValue)}`, { cache: "no-store" });
  const text = await res.text();

  if (!res.ok) throw new Error(`급식 API 오류 ${res.status}\n${text.slice(0, 600)}`);

  try {
    return JSON.parse(text);
  } catch (err) {
    throw new Error("급식 API 응답을 JSON으로 해석하지 못했습니다.\n" + text.slice(0, 600));
  }
}

function decodeLessonCode(value, data) {
  if (value === undefined || value === null || value === 0 || value === "0") {
    return { subject: "", teacher: "", changed: false, raw: value };
  }

  const raw = String(value);
  const changed = raw.startsWith(">");
  const numeric = Number(raw.replace(">", ""));

  if (!numeric) return { subject: "", teacher: "", changed, raw: value };

  const subjectIndex = Math.floor(numeric / 1000);
  const teacherIndex = numeric % 1000;

  return {
    subject: data["자료492"]?.[subjectIndex] || "",
    teacher: data["자료446"]?.[teacherIndex] || "",
    changed,
    raw: value
  };
}

function getDayArray(data, grade, classNo, dayIndex) {
  const changedDay = data?.["자료147"]?.[grade]?.[classNo]?.[dayIndex];
  const baseDay = data?.["자료481"]?.[grade]?.[classNo]?.[dayIndex];

  if (Array.isArray(changedDay) && changedDay.length > 1 && changedDay.slice(1).some((v) => v !== 0 && v !== "0")) {
    return changedDay;
  }

  return baseDay;
}

function render() {
  const grade = Number(state.grade);
  const date = dateFromInput(state.date);
  const dayIndex = date.getDay();

  updateGradeButtons();
  $("dateInput").value = state.date;
  $("tableTitle").textContent = `${grade}학년 시간표`;

  if (!state.data) return;

  const updated = state.updatedAt
    ? state.updatedAt.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })
    : "";

  $("refreshInfo").textContent = updated ? `마지막 새로고침: ${updated}` : "마지막 새로고침: -";

  if (dayIndex === 0 || dayIndex === 6) {
    setStatus(formatDateKST(state.date), "주말입니다. 해당 날짜 데이터가 없으면 빈칸으로 표시됩니다.", `${grade}학년`);
  } else {
    setStatus(formatDateKST(state.date), "", `${grade}학년`);
  }

  let thead = `
    <thead>
      <tr>
        <th class="period class-head">교시</th>
        ${Array.from({ length: CLASSES_PER_GRADE }, (_, i) => `<th class="class-head">${i + 1}반</th>`).join("")}
      </tr>
    </thead>
  `;

  let tbody = "<tbody>";

  for (let period = 1; period <= PERIODS; period++) {
    tbody += `<tr><th class="period">${period}교시</th>`;

    for (let classNo = 1; classNo <= CLASSES_PER_GRADE; classNo++) {
      const dayArray = getDayArray(state.data, grade, classNo, dayIndex);
      const lesson = decodeLessonCode(dayArray?.[period], state.data);
      const subject = lesson.subject || "";

      tbody += `
        <td class="${lesson.changed ? "changed" : ""}" title="${escapeHtml(lesson.teacher || "")}">
          <div class="cell ${subject ? "" : "empty"}">${escapeHtml(subject || "-")}</div>
        </td>
      `;
    }

    tbody += "</tr>";
  }

  tbody += "</tbody>";
  $("timetable").innerHTML = thead + tbody;
}

function renderMealLoading() {
  $("mealBadge").textContent = "불러오는 중";
  $("mealBox").className = "meal-empty";
  $("mealBox").textContent = "급식 정보를 불러오는 중입니다.";
  $("mealMeta").textContent = "";
}

function renderMeal(data) {
  if (!data?.ok || !Array.isArray(data.menu) || data.menu.length === 0) {
    $("mealBadge").textContent = "정보 없음";
    $("mealBox").className = "meal-empty";
    $("mealBox").textContent = data?.message || "해당 날짜의 급식 정보가 없습니다.";
    $("mealMeta").textContent = "";
    return;
  }

  $("mealBadge").textContent = data.mealName || "중식";
  $("mealBox").className = "meal-menu-card";
  $("mealBox").innerHTML = data.menu.map((item) => {
    const name = typeof item === "string" ? item : item.name;
    const allergens = Array.isArray(item?.allergens) ? item.allergens : [];
    const allergenNames = allergens
      .map((code) => ALLERGEN_MAP[String(code)] || String(code))
      .filter(Boolean)
      .join(" · ");

    return `
      <div class="meal-line">
        <span class="meal-name">${escapeHtml(name)}</span>
        ${allergenNames ? `<span class="allergen-names">(${escapeHtml(allergenNames)})</span>` : ""}
      </div>
    `;
  }).join("");
  $("mealMeta").textContent = data.calories ? `열량: ${data.calories}` : "";
  requestAnimationFrame(fitMealTextToCard);
}

function fitMealTextToCard() {
  const box = $("mealBox");
  if (!box || !box.classList.contains("meal-menu-card")) return;

  const maxFont = 22;
  const minFont = 13;

  box.style.setProperty("--meal-font-size", `${maxFont}px`);

  let size = maxFont;
  while (size > minFont && box.scrollHeight > box.clientHeight) {
    size -= 0.5;
    box.style.setProperty("--meal-font-size", `${size}px`);
  }
}

window.addEventListener("resize", () => {
  requestAnimationFrame(fitMealTextToCard);
});

async function loadMeal() {
  renderMealLoading();
  try {
    const meal = await fetchMeal(state.date);
    renderMeal(meal);
  } catch (err) {
    console.error(err);
    $("mealBadge").textContent = "오류";
    $("mealBox").className = "meal-empty";
    $("mealBox").textContent = "급식 정보를 불러오지 못했습니다.";
    $("mealMeta").textContent = err?.message || String(err);
  }
}

async function loadTimetable() {
  clearError();
  setLoading();
  $("reloadBtn").disabled = true;

  try {
    setStatus(formatDateKST(state.date), "내 사이트 API를 통해 컴시간 서버에 연결 중입니다.", "연결 중");
    const [timetable] = await Promise.all([
      fetchTimetable(state.date),
      loadMeal()
    ]);
    state.data = timetable;
    state.updatedAt = new Date();
    render();
  } catch (err) {
    console.error(err);
    showError("시간표를 불러오지 못했습니다.\n" + (err?.message || err));
    setStatus(formatDateKST(state.date), "시간표 로딩 실패", "오류");
  } finally {
    $("reloadBtn").disabled = false;
  }
}

function getSavedNotice() {
  try {
    return localStorage.getItem(LOCAL_NOTICE_KEY) || "";
  } catch (error) {
    return "";
  }
}

function saveNotice(value) {
  try {
    localStorage.setItem(LOCAL_NOTICE_KEY, value);
  } catch (error) {
    showError("공지사항을 이 브라우저에 저장하지 못했습니다.\n" + (error?.message || error));
  }
}

function renderNotice() {
  const value = getSavedNotice();
  const view = $("noticeView");
  const input = $("noticeInput");

  input.value = value;

  if (state.noticeEditing) {
    view.style.display = "none";
    input.style.display = "block";
    $("noticeEditBtn").textContent = "보기";
    setTimeout(() => input.focus(), 0);
  } else {
    input.style.display = "none";
    view.style.display = "block";
    $("noticeEditBtn").textContent = "수정";
    view.textContent = value || "공지사항을 입력하세요.";
    view.classList.toggle("notice-placeholder", !value);
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function updateGradeButtons() {
  document.querySelectorAll(".grade-btn").forEach((button) => {
    button.classList.toggle("active", Number(button.dataset.grade) === Number(state.grade));
  });
}

document.querySelectorAll(".grade-btn").forEach((button) => {
  button.addEventListener("click", () => {
    state.grade = Number(button.dataset.grade);
    render();
  });
});

$("dateInput").addEventListener("change", async (e) => {
  state.date = e.target.value;
  await loadTimetable();
});


$("reloadBtn").addEventListener("click", loadTimetable);

$("noticeEditBtn").addEventListener("click", () => {
  state.noticeEditing = !state.noticeEditing;
  renderNotice();
});

$("noticeSaveBtn").addEventListener("click", () => {
  saveNotice($("noticeInput").value.trim());
  state.noticeEditing = false;
  renderNotice();
});

$("noticeClearBtn").addEventListener("click", () => {
  saveNotice("");
  state.noticeEditing = false;
  renderNotice();
});

$("noticeInput").addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    saveNotice($("noticeInput").value.trim());
    state.noticeEditing = false;
    renderNotice();
  }
});

(async function init() {
  state.grade = 1;
  state.date = toDateInputValue(getKstDate());
  updateGradeButtons();
  $("dateInput").value = state.date;
  setStatus(formatDateKST(state.date), "시간표를 준비 중입니다.", "준비 중");
  renderNotice();
  updateClock();
  setInterval(updateClock, 1000);
  await loadTimetable();
})();
</script>
</body>
</html>
